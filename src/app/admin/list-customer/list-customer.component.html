<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestione Clienti</title>
  </head>
  <body class="bg-light">

    <!-- TOOLBAR -->
    <mat-toolbar
      class="d-flex flex-wrap justify-content-between align-items-center px-3 py-2 mb-3"
      color="primary"
    >
      <div class="d-flex align-items-center mb-2 mb-md-0">
        <span class="fs-4 me-3 text-white">Clienti</span>
        <button class="btn-back me-3" type="button" (click)="back()">
          &larr; Torna Indietro
        </button>
      </div>

      <div class="d-flex flex-wrap gap-2">
        <mat-form-field class="example-form-field" appearance="fill">
          <mat-label>Numero cliente</mat-label>
          <input
            #inputNumeroCliente
            matInput
            (input)="searchNumeroCliente(inputNumeroCliente.value)"
          />
        </mat-form-field>

        <mat-form-field class="example-form-field" appearance="fill">
          <mat-label>Nominativo</mat-label>
          <input
            #inputNominativo
            matInput
            (input)="searchNominativo(inputNominativo.value)"
          />
        </mat-form-field>

      </div>
    </mat-toolbar>

    <!-- LISTA CLIENTI -->
    <div class="container">
      <div class="row g-3">
        <div class="col-12" *ngFor="let customer of customersFrEnd">

          <div class="customer-card">

            <!-- HEADER: apre/chiude tendina -->
            <button
              type="button"
              class="customer-header-btn"
              data-bs-toggle="collapse"
              [attr.data-bs-target]="'#cActions' + customer.numeroCliente"
              aria-expanded="false"
              [attr.aria-controls]="'cActions' + customer.numeroCliente"
            >
              <span class="customer-info">
                <span class="customer-num">{{ customer.numeroCliente }}</span>
                <span class="customer-sep">—</span>
                <span class="customer-nom">{{ getCustomerDisplayName(customer) }}</span>
              </span>

              <span class="d-flex align-items-center gap-2">
                <!-- Pulsante note -->
                <button
                  *ngIf="globalService.hasPermission('CUSTOMERS_NOTES_VIEW')"
                  type="button"
                  class="btn btn-sm btn-notes action-with-tooltip"
                  (click)="navigateToNotes(customer.numeroCliente, getCustomerDisplayName(customer)); $event.stopPropagation()"
                  title="Apri le note del cliente"
                  aria-label="Apri le note del cliente"
                  data-tooltip="Note cliente"
                >
                  <mat-icon>sticky_note_2</mat-icon>
                </button>
                <span class="chev">▾</span>
              </span>
            </button>

            <!-- INFO RAPIDE (email + telefono) -->
            <div class="customer-meta-row">
              <span *ngIf="getCustomerEmail(customer)" class="meta-item">
                <mat-icon>email</mat-icon>{{ getCustomerEmail(customer) }}
              </span>
              <span *ngIf="getCustomerPhone(customer)" class="meta-item">
                <mat-icon>phone</mat-icon>{{ getCustomerPhone(customer) }}
              </span>
            </div>

            <!-- AZIONI -->
            <div
              class="collapse customer-actions"
              [attr.id]="'cActions' + customer.numeroCliente"
            >
              <div class="customer-actions-inner">

                <button
                  mat-raised-button
                  color="accent"
                  [routerLink]="['/gestioneTagCliente', customer.numeroCliente]"
                  class="action-with-tooltip"
                  title="Gestisci i tag del cliente"
                  aria-label="Gestisci tag cliente"
                  data-tooltip="Gestisci tag"
                >
                  <mat-icon>label</mat-icon>
                </button>

                <button
                  *ngIf="globalService.hasPermission('CUSTOMERS_MANAGE')"
                  mat-raised-button
                  color="accent"
                  (click)="navigateToEditCustomer(customer.numeroCliente)"
                  class="action-with-tooltip"
                  title="Modifica i dati del cliente"
                  aria-label="Modifica cliente"
                  data-tooltip="Modifica cliente"
                >
                  <mat-icon>edit</mat-icon>
                </button>

                <button
                  *ngIf="globalService.hasPermission('CUSTOMERS_MANAGE')"
                  mat-raised-button
                  color="warn"
                  (click)="exportAndDeleteCustomer(customer)"
                  class="action-with-tooltip"
                  title="Esporta il cliente in ZIP e poi lo elimina"
                  aria-label="Esporta ed elimina cliente"
                  data-tooltip="Esporta ed elimina"
                >
                  <mat-icon>delete</mat-icon>
                </button>

                <button
                  mat-raised-button
                  color="primary"
                  (click)="viewDocuments(customer.numeroCliente)"
                  class="action-with-tooltip"
                  title="Apri i documenti caricati per questo cliente"
                  aria-label="Apri documenti cliente"
                  data-tooltip="Documenti cliente"
                >
                  <mat-icon>folder</mat-icon>
                </button>

                <button
                  mat-raised-button
                  color="accent"
                  [routerLink]="['/schedaCliente', customer.numeroCliente]"
                  class="action-with-tooltip"
                  title="Apri la scheda riepilogativa del cliente"
                  aria-label="Apri scheda cliente"
                  data-tooltip="Scheda cliente"
                >
                  <mat-icon>badge</mat-icon>
                </button>

                <button
                  mat-raised-button
                  color="primary"
                  (click)="openCustomerWhatsApp(customer)"
                  class="action-with-tooltip"
                  title="Apri la chat WhatsApp del cliente senza messaggio precompilato"
                  aria-label="Apri WhatsApp"
                  data-tooltip="Apri WhatsApp"
                >
                  <i class="fab fa-whatsapp"></i>
                </button>

                <button
                  *ngIf="globalService.hasPermission('EMAIL_VIEW')"
                  mat-raised-button
                  color="accent"
                  (click)="composeCustomerEmail(customer)"
                  class="action-with-tooltip"
                  title="Crea una nuova email con il cliente già come destinatario"
                  aria-label="Scrivi email"
                  data-tooltip="Scrivi email"
                >
                  <mat-icon>mail</mat-icon>
                </button>

              </div>
            </div>

          </div>

        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
