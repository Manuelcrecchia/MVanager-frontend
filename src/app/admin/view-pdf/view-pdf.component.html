<div class="container py-4 pdf-page">
  <div class="pdf-page-header">
    <button type="button" class="btn btn-pdf-back" (click)="back()">
      &larr; Torna indietro
    </button>
  </div>

  <div class="pdf-shell">
    <div *ngIf="loadingPdf" class="pdf-loading">
      Caricamento preventivo...
    </div>

    <ngx-extended-pdf-viewer
      *ngIf="pdfSrc"
      #pdfViewer
      class="ngx-extended-pdf-viewer pdf-viewer"
      [src]="pdfSrc"
      useBrowserLocale="true"
      backgroundColor="#ffffff"
      [height]="'100%'"
      [customToolbar]="customToolbar"
      [filenameForDownload]="downloadName"
    >
    </ngx-extended-pdf-viewer>
  </div>

  <div class="confirm-panel" *ngIf="confirmCustomerMode && pdfSrc">
    <button
      type="button"
      class="btn btn-confirm-customer"
      (click)="confirmAndCreateCustomer()"
    >
      <i class="fas fa-check-double me-2"></i>
      Conferma e crea cliente
    </button>
  </div>

  <ng-template #customToolbar>
    <div class="pdf-toolbar">
      <div class="pdf-toolbar-left">
        <span class="pdf-toolbar-title">
          {{ signedPdfMode ? 'Preventivo firmato' : 'Preventivo' }}
        </span>
      </div>

      <div class="pdf-toolbar-actions">
        <button mat-raised-button class="btn-pdf-action btn-sky" (click)="printPdf()">
          🖨️ Stampa
        </button>

        <button mat-raised-button class="btn-pdf-action btn-orange" (click)="downloadPdf()">
          ⬇️ Scarica
        </button>
      </div>
    </div>
  </ng-template>
</div>
