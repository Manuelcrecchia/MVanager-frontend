<h2 class="dialog-title">Assegna attrezzature</h2>

<div class="body">
  <div *ngIf="loading" class="muted">Caricamento...</div>

  <div class="list" *ngIf="!loading">
    <div class="row-item" *ngFor="let item of equipment">
      <input
        type="checkbox"
        [checked]="isSelected(item.targetKey)"
        (change)="toggleEquipment(item.targetKey)"
      />
      <div class="meta">
        <div class="name">{{ item.targetLabel || item.targetKey }}</div>
        <div class="plate">{{ item.targetKey }} · quantità {{ item.quantity || 1 }}</div>
      </div>
      <div class="quantity-field" *ngIf="isSelected(item.targetKey)">
        <span>Assegna</span>
        <input
          type="number"
          min="1"
          [max]="getMaxQuantity(item)"
          [ngModel]="getAssignedQuantity(item.targetKey)"
          (ngModelChange)="setAssignedQuantity(item, $event)"
        />
      </div>
    </div>

    <div class="text-center py-3" *ngIf="equipment.length === 0">
      Nessuna attrezzatura disponibile. Aggiungila da Gestione attrezzature.
    </div>
  </div>

  <div class="selected-count" *ngIf="selectedEquipmentKeys.length > 0">
    {{ selectedEquipmentKeys.length }} attrezzatura/e selezionata/e
    <button type="button" class="btn-deselect" (click)="clearSelection()">Rimuovi tutte</button>
  </div>
</div>

<div class="actions">
  <div class="spacer"></div>
  <button class="btn btn-outline-light text-dark" (click)="cancel()">
    Annulla
  </button>
  <button class="btn btn-primary" (click)="save()">Salva</button>
</div>
