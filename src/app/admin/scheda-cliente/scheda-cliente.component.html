<div class="container py-4">
  <div class="d-flex justify-content-start align-items-center mb-3">
    <button class="btn btn-outline-primary rounded-pill" (click)="back()">
      Torna indietro
    </button>
  </div>

  <h2 class="text-center mb-4 text-primary">
    <i class="fas fa-user me-2"></i>Scheda cliente
  </h2>

  <div
    *ngIf="!cliente"
    class="alert alert-warning text-center shadow-sm rounded-pill"
  >
    Caricamento in corso o cliente non trovato...
  </div>

  <div
    *ngIf="cliente"
    class="card border-0 shadow-sm rounded-4 bg-white mx-auto"
    style="max-width: 760px"
  >
    <div class="card-body p-4">
      <h4 class="mb-3 text-center text-secondary">
        {{ getDisplayName() }}
      </h4>

      <div class="row mb-3">
        <div class="col-md-6 mb-2">
          <strong>Numero cliente:</strong> {{ cliente.numeroCliente }}
        </div>
        <div class="col-md-6 mb-2" *ngIf="cliente.tipoCliente">
          <strong>Tipo cliente:</strong> {{ cliente.tipoCliente }}
        </div>
      </div>

      <hr />

      <div class="row" *ngIf="getVisibleFields().length > 0; else noFields">
        <div
          class="col-md-6 mb-3"
          *ngFor="let field of getVisibleFields()"
        >
          <div class="text-muted small fw-semibold">
            {{ field.label || field.dbColumn || field.key }}
          </div>
          <div class="fs-6">
            {{ formatFieldValue(field) }}
          </div>
        </div>
      </div>

      <ng-template #noFields>
        <div class="alert alert-light border mb-0">
          Nessun campo cliente configurato in MVControl.
        </div>
      </ng-template>
    </div>
  </div>
</div>
