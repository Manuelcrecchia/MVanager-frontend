<div class="container py-4">
  <a class="btn-back" type="button" (click)="back()">Indietro</a>
  <h2 class="text-center mb-4">Nuovo Cliente</h2>

  <form #form="ngForm">
    <div
      class="alert alert-warning"
      *ngIf="!globalService.hasConfiguredFieldMapping('customer')"
    >
      Nessun campo cliente configurato in MVControl.
    </div>

    <div class="row g-3">
      <div
        class="col-md-6"
        *ngFor="let field of globalService.getVisibleFieldMappingFields('customer')"
      >
        <ng-container [ngSwitch]="field.type">
          <mat-checkbox
            *ngSwitchCase="'boolean'"
            [name]="field.dbColumn"
            [ngModel]="$any(customerModelService)[field.dbColumn]"
            (ngModelChange)="$any(customerModelService)[field.dbColumn] = $event"
          >
            {{ field.label || field.dbColumn }}
          </mat-checkbox>

          <mat-form-field *ngSwitchCase="'textarea'" appearance="fill" class="w-100">
            <mat-label>{{ field.label || field.dbColumn }}</mat-label>
            <textarea
              matInput
              rows="3"
              [name]="field.dbColumn"
              [required]="field.required === true"
              [ngModel]="$any(customerModelService)[field.dbColumn]"
              (ngModelChange)="$any(customerModelService)[field.dbColumn] = $event"
            ></textarea>
          </mat-form-field>

          <mat-form-field *ngSwitchDefault appearance="fill" class="w-100">
            <mat-label>{{ field.label || field.dbColumn }}</mat-label>
            <input
              matInput
              [type]="globalService.getDynamicInputType(field)"
              [name]="field.dbColumn"
              [required]="field.required === true"
              [ngModel]="$any(customerModelService)[field.dbColumn]"
              (ngModelChange)="$any(customerModelService)[field.dbColumn] = $event"
            />
          </mat-form-field>
        </ng-container>
      </div>
    </div>

    <div class="col-12 text-center mt-4">
      <button mat-raised-button color="primary" type="button" (click)="addCustomer()">
        Salva
      </button>
    </div>
  </form>
</div>
