<div class="missing-contact-dialog">
  <h2 mat-dialog-title>Dato mancante</h2>

  <div mat-dialog-content>
    <p>{{ data.message }}</p>
  </div>

  <div mat-dialog-actions align="end">
    <button mat-button type="button" (click)="close()">
      {{ data.closeLabel || 'Chiudi' }}
    </button>
    <button mat-raised-button color="primary" type="button" (click)="goToAction()">
      {{ data.actionLabel }}
    </button>
  </div>
</div>
