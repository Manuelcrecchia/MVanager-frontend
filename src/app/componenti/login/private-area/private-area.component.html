<style>
    :root{
      --brand-orange:#ff7a00;
      --brand-blue:#2fb7ff;
      --brand-black:#0f172a;
    }

    body{
      min-height:100vh;
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(47,183,255,0.12), transparent 50%),
        radial-gradient(900px 500px at 80% 10%, rgba(255,122,0,0.10), transparent 50%),
        radial-gradient(1200px 600px at 50% 100%, rgba(255,122,0,0.06), transparent 50%),
        linear-gradient(180deg,#eef4ff 0%,#f8fbff 100%);
      background-attachment:fixed;
    }

    .clouds{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.25;
      background:
        radial-gradient(600px 220px at 20% 78%, rgba(255,255,255,.8), transparent 70%),
        radial-gradient(700px 260px at 80% 80%, rgba(255,255,255,.8), transparent 70%),
        radial-gradient(820px 300px at 50% 92%, rgba(255,255,255,.8), transparent 70%);
      filter:blur(3px);
    }

    header{
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      background:rgba(255,255,255,.55)!important;
      border-bottom:1px solid rgba(255,255,255,.65)!important;
    }

    .login-wrap{
      position:relative;
      z-index:1;
    }

    .glass-card{
      width:100%;
      max-width:420px;
      border-radius:28px;
      background:rgba(255,255,255,0.75);
      border:1px solid rgba(255,255,255,0.9);
      box-shadow:
        0 25px 80px rgba(2,6,23,.10),
        0 8px 24px rgba(2,6,23,.06),
        inset 0 1px 0 rgba(255,255,255,.5);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      padding:32px 28px 28px;
      position:relative;
      overflow:hidden;
    }

    .glass-card::before{
      content:'';
      position:absolute;
      inset:0;
      border-radius:28px;
      padding:2px;
      background:linear-gradient(135deg, rgba(255,122,0,0.15), rgba(47,183,255,0.15), rgba(255,122,0,0.05));
      -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
    }

    .brand-area{
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-bottom:24px;
    }

    .brand-badge{
      width:120px;
      height:120px;
      border-radius:24px;
      padding:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
      border:1px solid rgba(255,255,255,.9);
      box-shadow:
        0 12px 32px rgba(2,6,23,.10),
        inset 0 1px 0 rgba(255,255,255,.5);
    }

    .brand-badge img{
      width:100%;
      height:auto;
      object-fit:contain;
      display:block;
    }

    .title{
      margin:12px 0 4px;
      font-weight:850;
      font-size:1.2rem;
      color:var(--brand-black);
      letter-spacing:-.3px;
    }

    .subtitle{
      color:rgba(15,23,42,.55);
      font-size:.88rem;
    }

    .tenant-selector{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
      margin-bottom:20px;
    }

    .tenant-card{
      border-radius:16px;
      border:1.5px solid rgba(0,0,0,0.07);
      background:#fff;
      color:var(--brand-black);
      padding:14px 12px;
      text-align:left;
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      box-shadow:0 2px 8px rgba(2,6,23,.04);
    }

    .tenant-card:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 24px rgba(2,6,23,.08);
    }

    .tenant-card strong{
      display:block;
      font-size:.95rem;
      margin-bottom:3px;
    }

    .tenant-card span{
      display:block;
      font-size:.78rem;
      color:rgba(15,23,42,.55);
      line-height:1.35;
    }

    .tenant-card.active{
      border-color:var(--brand-orange);
      box-shadow:0 0 0 3px rgba(255,122,0,.10), 0 8px 24px rgba(2,6,23,.08);
      transform:translateY(-2px);
    }

    .tenant-card:disabled{
      opacity:.6;
      cursor:default;
    }

    .tenant-hint{
      margin:-6px 0 16px;
      color:rgba(15,23,42,.5);
      font-size:.84rem;
      text-align:center;
    }

    .form-label{
      font-weight:700;
      color:rgba(15,23,42,.8);
      font-size:.85rem;
      margin-bottom:6px;
    }

    .input-wrap{
      position:relative;
    }

    .form-control{
      border-radius:14px;
      border:1.5px solid rgba(0,0,0,0.08);
      background:#fff;
      padding:12px 14px;
      font-size:.95rem;
      transition:border-color .18s ease, box-shadow .18s ease;
      box-shadow:0 1px 4px rgba(2,6,23,.04);
    }

    .form-control:focus{
      border-color:var(--brand-orange);
      box-shadow:0 0 0 3px rgba(255,122,0,.10);
      outline:none;
    }

    .form-control::placeholder{
      color:rgba(15,23,42,.3);
    }

    .btn-eye{
      border-radius:14px;
      border:1.5px solid rgba(0,0,0,0.08);
      background:#fff;
      padding:12px 14px;
      font-size:1.1rem;
      cursor:pointer;
      transition:border-color .18s ease;
      box-shadow:0 1px 4px rgba(2,6,23,.04);
    }

    .btn-eye:hover{
      border-color:rgba(0,0,0,0.15);
    }

    .forgot-row{
      display:flex;
      justify-content:flex-end;
      margin-top:6px;
    }

    .forgot-link{
      color:rgba(15,23,42,.6);
      text-decoration:none;
      font-weight:600;
      font-size:.85rem;
      cursor:pointer;
      transition:color .15s ease;
    }

    .forgot-link:hover{
      color:var(--brand-orange);
      text-decoration:underline;
    }

    .btn-login{
      border-radius:16px !important;
      padding:14px 14px;
      font-weight:900;
      font-size:1.05rem;
      border:2px solid rgba(0,0,0,0.12) !important;
      color:#000 !important;
      background:linear-gradient(135deg, #ff7a00, #ff9a3c) !important;
      box-shadow:0 12px 28px rgba(255,122,0,.30);
      transition:transform .15s ease, box-shadow .15s ease;
      letter-spacing:.3px;
      text-shadow:0 1px 0 rgba(255,255,255,.2);
    }

    .btn-login:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 40px rgba(255,122,0,.40) !important;
    }

    .btn-login:active{
      transform:translateY(0);
    }

    .btn-login:disabled{
      opacity:.6;
      filter:saturate(.6);
    }

    .btn-biometric{
      border-radius:14px;
      padding:11px 14px;
      font-weight:700;
      font-size:.9rem;
      border:1.5px solid rgba(0,0,0,0.08);
      color:var(--brand-black);
      background:#fff;
      box-shadow:0 2px 8px rgba(2,6,23,.04);
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      margin-top:10px;
    }

    .btn-biometric:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(2,6,23,.08);
      border-color:rgba(0,0,0,0.15);
    }

    @media (max-width: 520px){
      .glass-card{
        padding:24px 18px 22px;
        border-radius:22px;
      }

      .brand-badge{
        width:100px;
        height:100px;
      }

      .tenant-selector{
        grid-template-columns:1fr;
      }
    }
  </style>

<div class="clouds"></div>

<header class="py-3 border-bottom">
  <div class="container d-flex justify-content-between align-items-center">
    <span class="text-muted small">Versione {{ version }}</span>
  </div>
</header>

<main class="login-wrap d-flex justify-content-center align-items-center min-vh-100 px-3">
  <div class="glass-card">

    <div class="brand-area">
      <div class="brand-badge">
        <img src="../../../../assets/logo.png" alt="Logo"/>
      </div>
      <h4 class="title">Gestionale MVTech Core</h4>
      <div class="subtitle">Inserisci i tuoi dati per accedere</div>
    </div>

    <div class="tenant-selector" *ngIf="isMobile">
      <button
        type="button"
        class="tenant-card"
        [class.active]="selectedTenant === 'sami'"
        [disabled]="checkingLoginState"
        (click)="selectTenant('sami')"
      >
        <strong>SAMI</strong>
        <span>Impresa di pulizie e servizi</span>
      </button>

      <button
        type="button"
        class="tenant-card"
        [class.active]="selectedTenant === 'emmeci'"
        [disabled]="checkingLoginState"
        (click)="selectTenant('emmeci')"
      >
        <strong>Emmeci</strong>
        <span>Traslochi e ordini di servizio</span>
      </button>
    </div>

    <div class="tenant-hint" *ngIf="isMobile">
      {{ selectedTenant ? ('Tenant selezionato: ' + tenantService.tenantLabel) : 'Seleziona l\'azienda da aprire nell\'app.' }}
    </div>

    <form (submit)="loginFunction(email.value, password.value)" novalidate>

      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input
          #email
          type="email"
          id="email"
          class="form-control"
          placeholder="Inserisci la tua email..."
          [disabled]="!loginReady"
          required
        />
      </div>

      <div class="mb-2">
        <label for="password" class="form-label">Password</label>

        <div class="input-group">
          <input
            #password
            type="password"
            id="password"
            class="form-control"
            placeholder="Inserisci la password..."
            [disabled]="!loginReady"
            required
          />

          <button
            type="button"
            class="btn btn-eye"
            [disabled]="!loginReady"
            (click)="togglePasswordVisibility(password)"
          >
            👁️
          </button>
        </div>

        <div class="forgot-row">
<button
  type="button"
  [disabled]="!loginReady"
  (click)="navigateToPassworddimenticata(email.value)"
  class="forgot-link btn btn-link p-0">
  Password dimenticata?
</button>
        </div>
      </div>

      <div class="d-grid mt-3">
        <button type="submit" class="btn btn-login" [disabled]="!loginReady">
          {{ checkingLoginState ? 'Verifica tenant...' : 'Login' }}
        </button>
      </div>

      <div class="d-grid" *ngIf="biometricAvailable">
        <button
          type="button"
          class="btn btn-biometric"
          [disabled]="!loginReady"
          (click)="biometricLogin()"
        >
          Accedi con biometria
        </button>
      </div>

    </form>
  </div>
</main>
