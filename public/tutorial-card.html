<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MVanager tutorial</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; overflow: hidden; color: #fff; font-family: Arial, sans-serif; background: radial-gradient(circle at 20% 15%, #41798b 0, transparent 32%), radial-gradient(circle at 85% 80%, #bc8544 0, transparent 28%), #102d3d; }
    main { width: min(1050px, 82vw); }
    .eyebrow { margin-bottom: 28px; color: #b9dce6; font-size: 22px; font-weight: 700; letter-spacing: .13em; text-transform: uppercase; }
    h1 { max-width: 900px; margin: 0; font-size: clamp(54px, 7vw, 98px); line-height: 1.03; letter-spacing: -.04em; }
    p { max-width: 760px; margin: 28px 0 0; color: #e0edf1; font-size: clamp(25px, 2.5vw, 38px); line-height: 1.25; }
    .line { width: 90px; height: 8px; margin-top: 48px; border-radius: 99px; background: #e9ae5f; }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">MVanager · Tutorial</div>
    <h1 id="title"></h1>
    <p id="caption"></p>
    <div class="line"></div>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    document.getElementById('title').textContent = params.get('title') || 'Dal preventivo al cliente';
    document.getElementById('caption').textContent = params.get('caption') || 'Un flusso, senza dati duplicati.';
  </script>
</body>
</html>
